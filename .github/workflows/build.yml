name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # Locate sdkmanager
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            # Try alternative path
            SDKMANAGER=$(find ${ANDROID_SDK_ROOT}/cmdline-tools -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          echo "Using sdkmanager: $SDKMANAGER"

          # Accept licenses
          yes | ${SDKMANAGER} --licenses > /dev/null 2>&1 || true

          # Install required SDK components
          ${SDKMANAGER} --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;30.0.14904198"

      - name: Generate CI keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias your_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 3498762309 \
            -keypass 3498762309 \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=CN" \
            -noprompt

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/*.gradle', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          LIANYU_STORE_PASSWORD: 3498762309
          LIANYU_KEY_ALIAS: your_alias
          LIANYU_KEY_PASSWORD: 3498762309

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
